<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f7fa;
}

/* HEADER */
h1{
  color:#3b99e0;
  font-weight:600;
}
.block-heading{
  text-align:center;
  margin:40px 0;
  color:#666;
}

/* MAIN CARD */
.cart-box{
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  border-radius:4px;
  overflow:hidden;
}

/* LEFT PRODUCTS */
.product{
  padding:25px;
  border-bottom:1px solid #eee;
}

.product h5{
  color:#3b99e0;
}

/* QTY BOX */
.qty input{
  width:60px;
  text-align:center;
}

/* RIGHT SUMMARY */
.summary{
  background:#f7fbff;
  border-left:1px solid #e6eef7;
  padding:30px;
  height:100%;
}

.summary h3{
  text-align:center;
  margin-bottom:25px;
}

.summary-item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #e1e1e1;
}

/* CHECKOUT BUTTON */
.checkout{
  margin-top:20px;
  width:100%;
  background:#007bff;
  border:none;
  padding:12px;
  color:#fff;
  font-size:18px;
  border-radius:4px;
}
.checkout:hover{
  background:#0069d9;
}
</style>
</head>

<body>

<div class="container">

  <div class="block-heading">
    <h1>Shopping cart</h1>
    <p>The customer is very important...</p>
  </div>

  <div class="row cart-box">

    <!-- LEFT SIDE -->
    <div class="col-lg-8">

      <div class="product row align-items-center">
        <div class="col-md-3">
          <img src="https://via.placeholder.com/120">
        </div>

        <div class="col-md-4">
          <h5>I am very sorry</h5>
          <p>Display: 5 inches<br>RAM: 4GB<br>Memory: 32GB</p>
        </div>

        <div class="col-md-3 qty">
          <label>Quantity:</label>
          <input type="number" value="0" class="form-control">
        </div>

        <div class="col-md-2">
          <h5>$120</h5>
        </div>
      </div>

      <div class="product row align-items-center">
        <div class="col-md-3">
          <img src="https://via.placeholder.com/120">
        </div>

        <div class="col-md-4">
          <h5>I am very sorry</h5>
          <p>Display: 5 inches<br>RAM: 4GB<br>Memory: 32GB</p>
        </div>

        <div class="col-md-3 qty">
          <label>Quantity:</label>
          <input type="number" value="1" class="form-control">
        </div>

        <div class="col-md-2">
          <h5>$120</h5>
        </div>
      </div>

      <div class="product row align-items-center">
        <div class="col-md-3">
          <img src="https://via.placeholder.com/120">
        </div>

        <div class="col-md-4">
          <h5>I am very sorry</h5>
          <p>Display: 5 inches<br>RAM: 4GB<br>Memory: 32GB</p>
        </div>

        <div class="col-md-3 qty">
          <label>Quantity:</label>
          <input type="number" value="1" class="form-control">
        </div>

        <div class="col-md-2">
          <h5>$120</h5>
        </div>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="col-lg-4 summary">

      <h3>Summary</h3>

      <div class="summary-item">
        <span>Subtotal</span>
        <span>$360</span>
      </div>

      <div class="summary-item">
        <span>Discount</span>
        <span>$0</span>
      </div>

      <div class="summary-item">
        <span>Shipping</span>
        <span>$0</span>
      </div>

      <div class="summary-item">
        <span>Total</span>
        <span>$360</span>
      </div>

      <button class="checkout">checkout</button>

    </div>

  </div>

</div>

</body>
</html>
