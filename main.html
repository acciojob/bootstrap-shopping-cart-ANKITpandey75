<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    h1, h3 {
      color: #3b99e0;
    }

    .block-heading {
      text-align: center;
      margin-bottom: 30px;
    }

    .product {
      background: #fff;
      padding: 20px;
      border-bottom: 1px solid #eee;
    }

    .summary {
      background: #f7fbff;
      border-top: 3px solid #5ea4f3;
      padding: 25px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
    }

    .checkout-btn {
      width: 100%;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container my-5">

  <!-- HEADER -->
  <div class="block-heading">
    <h1>Shopping cart</h1>
    <p>The customer is very important and should be followed properly.</p>
  </div>

  <div class="row">

    <!-- PRODUCTS -->
    <div class="col-lg-8">

      <!-- Product 1 -->
      <div class="product row align-items-center">
        <div class="col-md-3">
          <img src="https://via.placeholder.com/120" class="img-fluid">
        </div>
        <div class="col-md-4">
          <h5>I am very sorry</h5>
          <p>Display: 5 inches<br>RAM: 4GB<br>Memory: 32GB</p>
        </div>
        <div class="col-md-3">
          <label>Quantity:</label>
          <input type="number" class="form-control" value="1" min="0">
        </div>
        <div class="col-md-2">
          <h5>$120</h5>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="product row align-items-center">
        <div class="col-md-3">
          <img src="https://via.placeholder.com/120" class="img-fluid">
        </div>
        <div class="col-md-4">
          <h5>I am very sorry</h5>
          <p>Same specifications</p>
        </div>
        <div class="col-md-3">
          <label>Quantity:</label>
          <input type="number" class="form-control" value="1" min="0">
        </div>
        <div class="col-md-2">
          <h5>$120</h5>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="product row align-items-center">
        <div class="col-md-3">
          <img src="https://via.placeholder.com/120" class="img-fluid">
        </div>
        <div class="col-md-4">
          <h5>I am very sorry</h5>
          <p>Same specifications</p>
        </div>
        <div class="col-md-3">
          <label>Quantity:</label>
          <input type="number" class="form-control" value="1" min="0">
        </div>
        <div class="col-md-2">
          <h5>$120</h5>
        </div>
      </div>

    </div>

    <!-- SUMMARY -->
    <div class="col-lg-4 summary">

      <h3 class="text-center">Summary</h3>

      <div class="summary-item">
        <span>Subtotal</span>
        <span>$360</span>
      </div>

      <div class="summary-item">
        <span>Discount</span>
        <span>$0</span>
      </div>

      <div class="summary-item">
        <span>Shipping</span>
        <span>$0</span>
      </div>

      <div class="summary-item">
        <span>Total</span>
        <span>$360</span>
      </div>

      <button class="btn btn-primary checkout-btn">Checkout</button>

    </div>

  </div>

</div>

</body>
</html>
